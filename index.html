<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей Милешеньки ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #fff0f5; font-family: sans-serif; color: #ff1493; overflow-x: hidden; scroll-behavior: smooth; }
        .section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; text-align: center; }
        
        .first-screen { background: #fff0f5; }
        .counter-box { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.6); z-index: 10; border: 2px solid #ffb6c1; }

        .second-screen { background: #1a002b; overflow: hidden; }
        #heart-canvas { max-width: 100%; height: auto; }

        .third-screen { background: #9400D3; padding: 40px 20px; box-sizing: border-box; }
        .congratulations { font-family: 'Pacifico', cursive; font-size: 2rem; color: #FFB6C1; line-height: 1.4; max-width: 800px; z-index: 10; }

        .heart-particle { position: fixed; color: #ffb6c1; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .scroll-hint { position: absolute; bottom: 30px; font-size: 1rem; color: #ff1493; animation: bounce 2s infinite; z-index: 10; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} }
    </style>
</head>
<body>

    <div class="section first-screen">
        <div class="counter-box">
            <h1>Для любимой Милешеньки</h1>
            <div id="counter" style="font-size: 1.5rem; font-weight: bold;">Считаем дни...</div>
        </div>
        <div class="scroll-hint">Листай вниз ❤️</div>
    </div>

    <div class="section second-screen">
        <canvas id="heart-canvas"></canvas>
        <div class="scroll-hint" style="color: white;">Ниже еще кое-что...</div>
    </div>

    <div class="section third-screen">
        <div class="congratulations">
            с 8 марта, моё солнышко! ❤️<br><br>
            ты — самое лучшее, что есть в моей жизни. <br>
            люблю тебя бесконечно!
        </div>
    </div>

    <script>
        const startDate = new Date('2024-08-02'); 
        function updateCounter() {
            const diff = new Date() - startDate;
            const days = Math.floor(diff / 86400000);
            document.getElementById('counter').innerText = `Мы вместе уже ${days} дней!`;
        }
        updateCounter(); setInterval(updateCounter, 1000);

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-particle'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw'; h.style.top = '-20px';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            h.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }, 400);

        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 600;

        const words = "i love you  "; // Все буквы маленькие
        let offset = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 13px Arial";
            ctx.fillStyle = "#FF69B4";

            for (let layer = 0; layer < 3; layer++) {
                const layerScale = 14 + (layer * 1.5);
                ctx.globalAlpha = 1 - (layer * 0.3);

                for (let i = 0; i < 100; i++) {
                    const t = (i / 100) * Math.PI * 2 + offset;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                    const char = words[i % words.length];
                    ctx.fillText(char, 300 + x * layerScale, 300 + y * layerScale);
                }
            }
            offset -= 0.007; 
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
