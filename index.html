<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Милеши 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f0fafa; 
            font-family: sans-serif; 
            overflow-x: hidden; 
        }

        /* ПЕРВЫЙ ЭКРАН */
        .first-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(to bottom, #e0f2f1, #ffffff);
        }

        .flower-scene { position: relative; text-align: center; }

        .sakura-flower {
            font-size: 280px; 
            color: #ffb7c5; 
            opacity: 0.8;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            animation: sway 6s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .counter-cloud {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            background: rgba(255, 255, 255, 0.95); 
            padding: 25px 40px;
            border-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 260px;
            border: 3px solid #fff;
            z-index: 10;
        }

        .counter-cloud h2 { font-family: 'Pacifico', cursive; color: #ff69b4; margin: 0; font-size: 1rem; }
        .counter-cloud #counter { font-size: 2rem; font-weight: bold; color: #333; margin: 5px 0; }
        .counter-cloud p { color: #888; margin: 0; font-size: 0.8rem; }

        /* ВТОРОЙ ЭКРАН: ЦИТАТА */
        .quote-screen {
            min-height: 60vh;
            background: #fff;
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }

        .quote-text {
            font-family: 'Pacifico', cursive;
            font-size: 1.4rem;
            color: #555;
            max-width: 320px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .divider { font-size: 1.8rem; margin: 20px 0; }

        .japanese-text {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.1rem;
            color: #ff69b4;
            letter-spacing: 2px;
        }

        /* РЕЧКА ВНИЗУ */
        .river {
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, #81d4fa, #29b6f6);
            position: relative;
            overflow: hidden;
            opacity: 0.7;
        }

        .river::before {
            content: "";
            position: absolute;
            width: 200%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/waves.png');
            animation: wave 10s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

    </style>
</head>
<body>

    <div class="first-screen">
        <div class="flower-scene">
            <div class="sakura-flower">🌸</div>
            <div class="counter-cloud">
                <h2>для любимой милешеньки</h2>
                <div id="counter">считаем...</div>
                <p>мы вместе уже</p>
            </div>
        </div>
    </div>

    <div class="quote-screen">
        <div class="quote-text">
            «Твоя любовь — это весна, которая цветет в моем сердце каждый день»
        </div>
        
        <div class="divider">🌸</div>
        
        <div class="japanese-text">
            あなたの愛は私の心に咲く春です
        </div>
        <p style="color: #aaa; font-size: 0.7rem; margin-top: 50px;">листай вниз к реке</p>
    </div>

    <div class="river"></div>

    <script>
        const startDate = new Date('2024-08-02');
        function updateCounter() {
            const today = new Date();
            const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('counter').innerText = `${diffDays} дня!`;
        }
        updateCounter();
    </script>

</body>
</html>
