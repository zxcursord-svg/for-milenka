<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Милеши 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f0fafa; font-family: sans-serif; overflow-x: hidden; }

        /* 1. ПЕРВЫЙ ЭКРАН С ЦВЕТКОМ */
        .first-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(to bottom, #e0f2f1, #ffffff);
        }
        .sakura-flower {
            font-size: 280px; color: #ffb7c5; opacity: 0.8;
            animation: sway 6s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
        
        .counter-cloud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 25px 40px; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 260px; border: 3px solid #fff; z-index: 10; text-align: center;
        }
        .counter-cloud h2 { font-family: 'Pacifico', cursive; color: #ff69b4; margin: 0; font-size: 1rem; }
        .counter-cloud #counter { font-size: 2rem; font-weight: bold; color: #333; margin: 5px 0; }

        /* 2. ЭКРАН С ТВОИМ СЕРДЦЕМ */
        .heart-screen {
            height: 60vh; display: flex; justify-content: center; align-items: center; background: #fff;
        }
        .heart {
            position: relative; width: 100px; height: 90px; background-color: #ff3860;
            transform: rotate(-45deg); animation: beat 0.8s infinite alternate;
        }
        .heart:before, .heart:after {
            content: ""; position: absolute; width: 100px; height: 100px;
            background-color: #ff3860; border-radius: 50%;
        }
        .heart:before { top: -50px; left: 0; }
        .heart:after { top: 0; left: 50px; }
        @keyframes beat { to { transform: scale(1.1) rotate(-45deg); } }
        
        .heart-text {
            position: absolute; width: 200px; text-align: center;
            transform: rotate(45deg); top: 20px; left: -50px;
            font-family: 'Pacifico', cursive; color: white; font-size: 14px;
        }

        /* 3. ЭКРАН С ЦИТАТОЙ */
        .quote-screen { padding: 80px 20px; text-align: center; background: #fff; }
        .quote-text { font-family: 'Pacifico', cursive; font-size: 1.3rem; color: #555; margin-bottom: 20px; }
        .japanese-text { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; color: #ff69b4; }

        /* 4. РЕЧКА И ЛЕПЕСТКИ */
        .river { width: 100%; height: 80px; background: #81d4fa; opacity: 0.7; }
        
        .petal {
            position: fixed; top: -50px; z-index: 99; color: #ffb7c5;
            pointer-events: none; animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="first-screen">
        <div class="flower-scene">
            <div class="sakura-flower">🌸</div>
            <div class="counter-cloud">
                <h2>для любимой милешеньки</h2>
                <div id="counter">...</div>
                <p style="color:#888; font-size:0.8rem; margin:0;">мы вместе уже</p>
            </div>
        </div>
    </div>

    <div class="heart-screen">
        <div class="heart">
            <div class="heart-text"><marquee scrollamount="5">I LOVE YOU MILENA</marquee></div>
        </div>
    </div>

    <div class="quote-screen">
        <div class="quote-text">«Твоя любовь — это весна, которая цветет в моем сердце каждый день»</div>
        <div style="margin:15px">🌸</div>
        <div class="japanese-text">あなたの愛は私の心に咲く春です</div>
    </div>

    <div class="river"></div>

    <script>
        // Счетчик
        const startDate = new Date('2024-08-02');
        setInterval(() => {
            const diffDays = Math.floor((new Date() - startDate) / 86400000);
            document.getElementById('counter').innerText = diffDays + ' дня!';
        }, 1000);

        // Лепестки
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerHTML = '🌸';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = Math.random() * 15 + 10 + 'px';
            p.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }, 400);
    </script>
</body>
</html>
